name: Keep Streamlit App Awake

on:
  schedule:
    # Τρέχει κάθε μέρα στις 12 τα μεσάνυχτα
    - cron: '0 0 * * *'
  workflow_dispatch: # Σου επιτρέπει να το τρέχεις χειροκίνητα για δοκιμή

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up the app
        run: |
          curl -I https://portfolio-app-nefeli-trianti.streamlit.app
